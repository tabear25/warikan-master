# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy this file from the Render dashboard via "New +" → "Blueprint".
#
# This is the FREE-PLAN configuration: no persistent disk (Render's free tier
# does not support disks). SQLite lives on the container's local filesystem,
# which means data is RESET on every redeploy / restart / wake-from-sleep.
#
# To keep data across restarts:
#   1. Change `plan: free` to `plan: starter` (paid, ~$7/mo).
#   2. Add the disk block (see deploy/README.md "永続化したい場合" section).
#   3. Set DB_PATH to /data/data.db.

services:
  - type: web
    name: warikan-master
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /app/data/data.db
      - key: PORT
        value: 10000
      # 管理者認証情報。sync: false により値はリポジトリに含めず、
      # Render dashboard で個別に入力する（ADMIN_PASSWORD_HASH は bcrypt ハッシュ）。
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
